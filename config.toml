[colors]
background = 234
active = { r = 198, g = 244, b = 208 }
foreground = "white"
inactive = 250

[keys.global]
quit = "q"
up = "k"
down = "j"
search = "S"
escape = "esc"
help = "H"
switch_focus = "tab"

[keys.task]
add = "a"
edit = "e"
delete = "delete"
complete = "x"
in_progress = "p"
description = "d"
details = "enter"

[keys.category]
add = "a"
delete = "D"
sort = "s"
enter_tasks = "enter"
clear_overdue = "c"
clear_done = "d"

[keys.popup]
next = "j"
prev = "k"
submit = "enter"
cancel = "esc"
edit_mode = "e"
clear = "c"
